name: retail-sample
networks:
  default:
    name: retail-sample_defaultnw
services:
  carts-db:
    # Adding the below extra linux capabilities so that the container can manage file permissions.
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - all
    # Dummy Health Check as it is a local DynamoDB implementation.
    healthcheck:
      interval: 5s
      retries: 3
      test:
        - CMD-SHELL
        - exit 0
      timeout: 15s
    # To set hostname of container to carts-db.
    hostname: carts-db
    image: amazon/dynamodb-local:1.20.0
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To lock the file system as read-only for security.
    read_only: true
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
    # Temporary file system where the container does not have exec or super-user privileges.
    tmpfs:
      - /tmp:rw,noexec,nosuid
  cart:
    # Adding the below extra linux capabilities so that the container can bind to port numbers less than 1024.
    cap_add:
      - NET_BIND_SERVICE
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - all
    # Added explicit dependency on carts-db healthy container.
    depends_on:
      carts-db:
        required: true
        condition: service_healthy
    environment:
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_CART_PERSISTENCE_PROVIDER=dynamodb
      - RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT=http://carts-db:8000
      - RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE=true
      - AWS_ACCESS_KEY_ID=key
      - AWS_SECRET_ACCESS_KEY=dummy
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: carts
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To lock the file system as read-only for security.
    read_only: true
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
    # Temporary file system where the container does not have exec or super-user privileges.
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.3.0
  checkout-redis:
    healthcheck:
      interval: 1s
      retries: 30
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
    hostname: checkout-redis
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To restart the container always in case of any failure.
    restart: always
    image: redis:6.0-alpine
  checkout:
    # Adding the below extra linux capabilities so that the container can bind to port numbers less than 1024.
    cap_add:
      - NET_BIND_SERVICE
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - all
    # Added explicit dependency on checkout-redis healthy container.
    depends_on:
      checkout-redis:
        condition: service_healthy
        required: true
    environment:
      - RETAIL_CHECKOUT_PERSISTENCE_PROVIDER=redis
      - RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL=redis://checkout-redis:6379
      - RETAIL_CHECKOUT_ENDPOINTS_ORDERS=http://orders:8080
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: checkout
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To lock the file system as read-only for security.
    read_only: true
    # To restart the container always in case of any failure.
    restart: always
    # Temporary file system where the container does not have exec or super-user privileges.
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.3.0
  catalog-db:
    environment:
      - reschedule=on-node-failure
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=catalogdb
      - MYSQL_USER=catalog_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - catalog_user
        - -p${DB_PASSWORD}
      timeout: 5s
    hostname: catalog-db
    image: mariadb:10.9
    # To attach to the default network specified at the compose file level.
    networks:
      default: null
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
  catalog:
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - all
    # Added explicit dependency on catalog-db healthy container.
    depends_on:
      catalog-db:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - GIN_MODE=release
      - reschedule=on-node-failure
      - RETAIL_CATALOG_PERSISTENCE_PROVIDER=mysql
      - RETAIL_CATALOG_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_CATALOG_PERSISTENCE_ENDPOINT=catalog-db:3306
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: catalog
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
    image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0
  orders-db:
    environment:
      - reschedule=on-node-failure
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=orders
      - POSTGRES_USER=orders_user
    healthcheck:
      interval: 10s
      retries: 30
      test:
        - CMD-SHELL
        - pg_isready -d orders -U orders_user
      timeout: 5s
    hostname: orders-db
    image: postgres:18.4
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
  orders:
    # Adding the below extra linux capabilities so that the container can bind to port numbers less than 1024.
    cap_add:
      - NET_BIND_SERVICE
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - all
    # Added explicit dependency on orders-db healthy container.
    depends_on:
      orders-db:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - reschedule=on-node-failure
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_ORDERS_PERSISTENCE_PROVIDER=postgres
      - RETAIL_ORDERS_PERSISTENCE_ENDPOINT=orders-db:5432
      - RETAIL_ORDERS_PERSISTENCE_NAME=orders
      - RETAIL_ORDERS_PERSISTENCE_USERNAME=orders_user
      - RETAIL_ORDERS_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_ORDERS_MESSAGING_PROVIDER=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES=rabbitmq:5672
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD=${DB_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: orders
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To lock the file system as read-only for security.
    read_only: true
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
    # Temporary file system where the container does not have exec or super-user privileges.
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.3.0
  rabbitmq:
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=${DB_PASSWORD}
    hostname: rabbitmq
    image: rabbitmq:3-management
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # To ensure that the container is accessible only within the Docker network, we provide the ports as empty list.
    ports: []
    # To restart the container always in case of any failure.
    restart: always
    # To secure the container, no new privileges are allowed in the container.
    security_opt:
      - no-new-privileges:true
  ui:
    # Removing any other linux capabilities to lock down the container for security.
    cap_drop:
      - ALL
    # Added explicit dependency on cart, catalog, checkout and orders healthy containers.
    depends_on:
      cart:
        condition: service_healthy
        required: true
        restart: true
      catalog:
        condition: service_healthy
        required: true
        restart: true
      checkout:
        condition: service_healthy
        required: true
        restart: true
      orders:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_UI_ENDPOINTS_CATALOG=http://catalog:8080
      - RETAIL_UI_ENDPOINTS_CARTS=http://carts:8080
      - RETAIL_UI_ENDPOINTS_ORDERS=http://orders:8080
      - RETAIL_UI_ENDPOINTS_CHECKOUT=http://checkout:8080
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -s -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: ui
    # Placing the memory limit on the container to use 512 MB.
    mem_limit: 512m
    networks:
    # To attach to the default network specified at the compose file level.
      default: null
    # Exposing the UI via Port 80 on Host Machine by mapping to Container Port 8080
    ports:
      - mode: ingress
        protocol: tcp
        published: 80
        target: 8080
    # To restart the container always in case of any failure.
    restart: always
    image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.3.0